- type: species
  id: Aoieirian
  name: Aoieirian
  roundStart: true
  prototype: MobAoieirian
  sprites: MobAoieirianSprites
  markingLimits: MobAoieirianMarkingLimits
  dollPrototype: MobAoieirianDummy
  skinColoration: HumanToned
  # begin Goobstation: port EE height/width sliders
  minHeight: 0.90
  defaultHeight: 1
  maxHeight: 1.20
  minWidth: 0.90
  defaultWidth: 1
  maxWidth: 1.10
  # end Goobstation: port EE height/width sliders

# The lack of a layer means that
# this person cannot have round-start anything
# applied to that layer. It has to instead
# be defined as a 'custom base layer'
# in either the mob's starting marking prototype,
# or it has to be added in C#.
- type: speciesBaseSprites
  id: MobAoieirianSprites
  sprites:
    Special: MobHumanoidAnyMarking
    Head: MobAoieirianHead
    Face: MobHumanoidAnyMarking
    Hair: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    Underwear: MobHumanoidAnyMarking
    Undershirt: MobHumanoidAnyMarking
    Chest: MobAoieirianChest
    Groin: MobAoieirianGroin
    Eyes: MobHumanoidEyes
    HeadTop: MobHumanoidAnyMarking
    LArm: MobAoieirianLArm
    RArm: MobAoieirianRArm
    LHand: MobAoieirianLHand
    RHand: MobAoieirianRHand
    LLeg: MobAoieirianLLeg
    RLeg: MobAoieirianRLeg
    LFoot: MobAoieirianLFoot
    RFoot: MobAoieirianRFoot
    Tail: MobHumanoidAnyMarking # Goobstation - Required for felinids, harpies & tajaran.
    HeadSide: MobHumanoidAnyMarking # Oni port from DeltaV

- type: markingPoints
  id: MobAoieirianMarkingLimits
  points:
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Snout:
      points: 1
      required: false
    Tail: # the cat tail joke, its real *godo*
      points: 2
      required: false
    HeadTop:
      points: 8
      required: false
    HeadSide:
      points: 8
      required: false
    Chest:
      points: 10
      required: false
    Underwear:
      points: 1
      required: false
    Undershirt:
      points: 1
      required: false
    RightLeg:
      points: 2
      required: false
    RightFoot:
      points: 2
      required: false
    LeftLeg:
      points: 2
      required: false
    LeftFoot:
      points: 2
      required: false
    RightArm:
      points: 2
      required: false
    RightHand:
      points: 3
      required: false
    LeftArm:
      points: 2
      required: false
    LeftHand:
      points: 3
      required: false

