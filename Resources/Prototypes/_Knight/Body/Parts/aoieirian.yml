- type: entity
  id: PartAoieirian
  parent: [BaseItem, BasePart]
  name: "aoieirian body part"
  abstract: true
  components:
  - type: Icon # Shitmed Change
    sprite: Mobs/Species/Aoieirian/parts.rsi
  - type: BodyPart # Shitmed Change
    species: Aoieirian
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10

